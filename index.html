<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Un lugar para vos y una Palabra para hoy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --night: #2b2340;
    --night2: #3d3159;
    --ember: #7dd8c0;
    --ember-light: #a8e6d5;
    --cream: #fbf7ff;
    --paper: #fdfaff;
    --ink: #362d52;
    --ink-soft: #75699a;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--night);
    color: var(--cream);
    font-family: 'Work Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  .screen {
    min-height: 100vh;
    width: 100%;
    display: none;
  }
  .screen.active { display: block; }

  /* ---------- glow background shared ---------- */
  .glow-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    background:
      radial-gradient(circle 380px at 50% 14%, rgba(168,230,213,0.16), transparent 70%),
      radial-gradient(circle 500px at 80% 90%, rgba(125,216,192,0.08), transparent 70%),
      linear-gradient(180deg, var(--night) 0%, var(--night2) 100%);
    pointer-events: none;
  }
  .flicker {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: radial-gradient(circle 420px at 50% 10%, rgba(168,230,213,0.10), transparent 70%);
    animation: flicker 5s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes flicker {
    0%, 100% { opacity: 0.7; }
    45% { opacity: 1; }
    50% { opacity: 0.85; }
    72% { opacity: 1; }
  }
  @media (prefers-reduced-motion: reduce) {
    .flicker { animation: none; opacity: 0.85; }
  }

  /* ---------- COVER ---------- */
  #cover { position: relative; }
  .cover-inner {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: 44px 22px 50px;
    text-align: center;
  }
  .logo-frame {
    width: 190px;
    height: 150px;
    margin: 0 auto 18px;
    border-radius: 20px;
    overflow: hidden;
    background: #fdfaff;
    border: 3px solid rgba(168,230,213,0.5);
    box-shadow: 0 0 0 6px rgba(168,230,213,0.08), 0 10px 30px rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .logo-frame img {
    width: 100%; height: 100%;
    object-fit: contain;
  }
  .group-name {
    font-size: 13px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--ember-light);
    font-weight: 600;
    margin-bottom: 22px;
  }
  .cover-inner h1 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: clamp(28px, 8vw, 38px);
    line-height: 1.25;
    margin: 0 0 10px;
    color: var(--cream);
  }
  .cover-inner h1 em {
    font-style: italic;
    color: var(--ember-light);
  }
  .cover-inner p.tag {
    font-size: 14px;
    color: rgba(251,247,255,0.6);
    margin: 0 0 22px;
    line-height: 1.5;
  }
  .cover-inner p.dedication {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 14.5px;
    color: var(--ember-light);
    line-height: 1.6;
    margin: 0 0 34px;
    padding: 14px 18px;
    border-top: 1px solid rgba(168,230,213,0.25);
    border-bottom: 1px solid rgba(168,230,213,0.25);
  }

  .candle-icon { width: 64px; height: 64px; margin: 0 auto 8px; display: block; }

  .prompt {
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: rgba(251,247,255,0.5);
    margin: 30px 0 16px;
    font-weight: 600;
  }

  .state-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .state-btn {
    background: rgba(251,247,255,0.06);
    border: 1px solid rgba(168,230,213,0.25);
    border-radius: 16px;
    padding: 18px 10px 14px;
    color: var(--cream);
    font-family: 'Work Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s ease, transform 0.2s ease, border-color 0.2s ease;
    text-align: center;
  }
  .state-btn:hover, .state-btn:focus-visible {
    background: rgba(168,230,213,0.14);
    border-color: rgba(168,230,213,0.55);
    transform: translateY(-2px);
  }
  .state-btn:active { transform: translateY(0); }
  .state-btn .e { font-size: 26px; display: block; margin-bottom: 8px; }

  /* ---------- STATE SCREEN ---------- */
  #state-screen .inner {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: 26px 20px 60px;
  }
  .back-btn {
    background: none;
    border: 1px solid rgba(168,230,213,0.3);
    color: var(--ember-light);
    font-family: 'Work Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 16px;
    border-radius: 20px;
    cursor: pointer;
    margin-bottom: 26px;
  }
  .back-btn:hover { background: rgba(168,230,213,0.1); }

  .state-title {
    text-align: center;
    margin-bottom: 22px;
  }
  .state-title .e { font-size: 34px; display: block; margin-bottom: 6px; }
  .state-title h2 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 22px;
    margin: 0;
    color: var(--cream);
  }

  .verse-card {
    background: var(--paper);
    color: var(--ink);
    border-radius: 20px;
    padding: 28px 24px;
    box-shadow: 0 16px 40px rgba(0,0,0,0.35);
    text-align: center;
    min-height: 220px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    transition: opacity 0.35s ease, transform 0.35s ease;
  }
  .verse-card.fading { opacity: 0; transform: translateY(6px); }
  .verse-card blockquote {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 18px;
    line-height: 1.5;
    margin: 0 0 10px;
    color: var(--ink);
  }
  .verse-card .ref {
    font-size: 12.5px;
    font-weight: 600;
    color: var(--ember);
    letter-spacing: 0.5px;
    margin-bottom: 20px;
  }
  .verse-card .divider {
    width: 40px;
    height: 1px;
    background: rgba(58,42,26,0.2);
    margin: 0 auto 20px;
  }
  .verse-card .prayer-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--ink-soft);
    font-weight: 600;
    margin-bottom: 8px;
  }
  .verse-card .prayer {
    font-size: 14.5px;
    line-height: 1.6;
    color: var(--ink);
  }

  .next-btn {
    display: block;
    width: 100%;
    margin-top: 20px;
    background: linear-gradient(135deg, var(--ember), #c96a12);
    color: #fff;
    border: none;
    border-radius: 30px;
    padding: 15px;
    font-family: 'Work Sans', sans-serif;
    font-size: 14.5px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 8px 20px rgba(125,216,192,0.3);
    transition: transform 0.15s ease;
  }
  .next-btn:active { transform: scale(0.98); }

  .write-toggle {
    display: block;
    width: 100%;
    margin-top: 28px;
    background: none;
    border: 1px dashed rgba(168,230,213,0.4);
    color: var(--ember-light);
    border-radius: 16px;
    padding: 14px;
    font-family: 'Work Sans', sans-serif;
    font-size: 13.5px;
    font-weight: 500;
    cursor: pointer;
  }
  .write-toggle:hover { background: rgba(168,230,213,0.08); }

  .write-box {
    margin-top: 16px;
    display: none;
  }
  .write-box.open { display: block; }
  .write-box .privacy {
    font-size: 12px;
    color: rgba(251,247,255,0.55);
    line-height: 1.6;
    margin-bottom: 10px;
    text-align: center;
  }
  .write-box textarea {
    width: 100%;
    min-height: 110px;
    background: rgba(251,247,255,0.07);
    border: 1px solid rgba(168,230,213,0.25);
    border-radius: 14px;
    padding: 14px;
    color: var(--cream);
    font-family: 'Work Sans', sans-serif;
    font-size: 14px;
    line-height: 1.5;
    resize: vertical;
  }
  .write-box textarea::placeholder { color: rgba(251,247,255,0.35); }
  .write-box textarea:focus { outline: none; border-color: rgba(168,230,213,0.6); }
  .write-note {
    text-align: center;
    font-size: 11.5px;
    color: rgba(251,247,255,0.4);
    margin-top: 8px;
  }
</style>
</head>
